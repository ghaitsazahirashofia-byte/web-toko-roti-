<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread sopiieww - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="mockup-container">
        
        <header>
            <div class="logo-container">
                <img src="img/logo.jpeg" alt="Logo" class="logo-img">
                <div class="logo-text">BREAD sopiieww </div>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="pages.html" class="active">Pages</a>
                <a href="contact.html">Contact Us</a>
            </nav>
            <div class="search-icon"></div>
        </header>

        <main class="home-main">
            <h1 class="page-title">Home Bread</h1>
            
            <div class="hero-card">
                <div class="hero-image-box">
                    <img src="img/roti.jpg" alt="Roti Utama">
                </div>
                <div class="hero-text-box">
                    <h2>Welcome to our store</h2>
                    <p>Roti lezat untuk setiap momen spesial Anda.</p>
                    <a href="produk.html" class="btn-belanja" style="display: inline-block; background-color: #e67e22; color: white; padding: 12px 24px; border-radius: 20px; text-decoration: none; font-weight: bold; text-align: center; cursor: pointer; position: relative; z-index: 10;">
                        Belanja Sekarang
                    </a>
                </div>
            </div>
        </main>

        <section class="popular-section">
    <h3 class="section-title">Produk Populer</h3>
    <div class="product-mini-grid">
        
        <div class="mini-item">
            <div class="img-wrapper"><img src="img/croissant.jpg" alt="Croissant"></div>
            <span>Croissant</span>
            <p class="mini-price">Rp 15.000</p> </div>
        
        <div class="mini-item">
            <div class="img-wrapper"><img src="img/donat.jpg" alt="donat"></div>
            <span>Donat</span>
            <p class="mini-price">Rp 20.000</p> </div>
        
        <div class="mini-item">
            <div class="img-wrapper"><img src="img/cokies.jpg" alt="Cookies"></div>
            <span>Cookies</span>
            <p class="mini-price">Rp 18.000</p> </div>
        
        <div class="mini-item">
            <div class="img-wrapper"><img src="img/waffle.jpg" alt="Waffle"></div>
            <span>Waffle</span>
            <p class="mini-price">Rp 12.000</p> </div>
        
        <div class="mini-item">
            <div class="img-wrapper"><img src="img/danish pastry.jpg" alt="Danish Pastry"></div>
            <span>Danish Pastry</span>
            <p class="mini-price">Rp 22.000</p> </div>

    </div>
</section>
    </div>

</body>
</html>
