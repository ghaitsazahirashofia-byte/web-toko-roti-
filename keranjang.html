<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread sopiieww - Keranjang Belanja</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="mockup-container" style="max-width: 900px; margin: 20px auto; background-color: #fffaf5; border: 2px solid #ebdcd0; border-radius: 20px; padding: 20px; font-family: sans-serif;">
        <header style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #ebdcd0; margin-bottom: 20px;">
            <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
                <img src="img/logo.jpeg" alt="Logo" style="width: 40px; height: 40px; border-radius: 5px;">
                <div style="font-weight: bold; color: #4a3728;">BREAD TALE</div>
            </div>
            <nav style="display: flex; gap: 20px;">
                <a href="index.html" style="text-decoration: none; color: #4a3728;">Home</a>
                <a href="pages.html" style="text-decoration: none; color: #4a3728;">Pages</a>
                <a href="keranjang.html" style="text-decoration: none; color: #e67e22; font-weight: bold;">Keranjang</a>
            </nav>
            <div>🔍</div>
        </header>

        <main>
            <h2 style="color: #2b1810; margin-bottom: 20px; font-size: 1.4rem;">Keranjang Belanja</h2>

            <div id="keranjang-kosong" style="text-align: center; padding: 40px; display: none;">
                <p style="color: #8c7665; font-size: 1.1rem;">Keranjang Anda masih kosong. Silakan pilih produk terlebih dahulu!</p>
                <a href="produk.html" style="display: inline-block; margin-top: 15px; background: #e67e22; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold;">Lihat Produk</a>
            </div>

            <div id="wrapper-tabel-keranjang">
                <table style="width: 100%; border-collapse: collapse; text-align: left; background-color: #fff; border-radius: 10px; overflow: hidden; margin-bottom: 30px;">
                    <thead>
                        <tr style="background-color: #fdf5ee; color: #4a3728; border-bottom: 2px solid #ebdcd0;">
                            <th style="padding: 12px 15px;">Produk</th>
                            <th style="padding: 12px 15px;">Harga</th>
                            <th style="padding: 12px 15px; text-align: center;">Jumlah</th>
                            <th style="padding: 12px 15px;">Subtotal</th>
                            <th style="padding: 12px 15px; text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="isi-tabel-produk" style="color: #4a3728;">
                        </tbody>
                </table>

                <div style="display: flex; justify-content: flex-end;">
                    <div style="width: 100%; max-width: 350px; background-color: #fff; border: 1px solid #ebdcd0; border-radius: 15px; padding: 20px;">
                        <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 1.1rem; color: #2b1810; border-bottom: 1px solid #f3eae1; padding-bottom: 8px;">Ringkasan Belanja</h3>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>Subtotal</span>
                            <span id="summary-subtotal">Rp 0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                            <span>Ongkir</span>
                            <span>Rp 10.000</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-weight: bold; border-top: 1px dashed #ebdcd0; padding-top: 12px; margin-bottom: 20px;">
                            <span>Total</span>
                            <span id="summary-total" style="color: #e67e22;">Rp 0</span>
                        </div>
                        <button onclick="window.location.href='checkout.html';" style="width: 100%; background-color: #e67e22; color: #fff; border: none; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer;">
                            Checkout
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

</script>
   <script>
function loadKeranjang() {
    // Ambil daftar produk berbentuk Array
    const dataLocal = localStorage.getItem('produkKeranjangReal');
    const boxKosong = document.getElementById('keranjang-kosong');
    const wrapperTabel = document.getElementById('wrapper-tabel-keranjang');
    const tbody = document.getElementById('isi-tabel-produk');

    // Cek jika keranjang kosong atau isinya kosong []
    if (!dataLocal || JSON.parse(dataLocal).length === 0) {
        boxKosong.style.display = 'block';
        wrapperTabel.style.display = 'none';
        return;
    }

    boxKosong.style.display = 'none';
    wrapperTabel.style.display = 'block';
    
    const listItem = JSON.parse(dataLocal);
    let htmlBaris = '';
    let totalSubtotalAll = 0;


    listItem.forEach((item, index) => {
        let angkaHarga = parseInt(item.harga.replace(/[^0-9]/g, ''));
        let subtotalPerItem = angkaHarga * item.jumlah;
        totalSubtotalAll += subtotalPerItem;

        htmlBaris += `
            <tr style="border-bottom: 1px solid #f3eae1;">
                <td style="padding: 15px; display: flex; align-items: center; gap: 12px;">
                    <img src="${item.img}" style="width: 45px; height: 45px; object-fit: contain;">
                    <span>${item.nama}</span>
                </td>
                <td style="padding: 15px;">${item.harga}</td>
                <td style="padding: 15px; text-align: center;">
                    <div style="display: inline-flex; align-items: center; border: 1px solid #ebdcd0; border-radius: 20px; padding: 2px 8px; background: #fffaf5;">
                        <span style="margin: 0 10px; font-size: 0.9rem;">${item.jumlah}</span>
                    </div>
                </td>
                <td style="padding: 15px; font-weight: bold;">Rp ${subtotalPerItem.toLocaleString('id-ID')}</td>
                <td onclick="hapusItem(${index})" style="padding: 15px; text-align: center; color: #c0392b; cursor: pointer;">🗑️</td>
            </tr>
        `;
    });

    // Masukkan baris produk ke tabel
    tbody.innerHTML = htmlBaris;

    // Update Teks Ringkasan Harga
    document.getElementById('summary-subtotal').innerText = 'Rp ' + totalSubtotalAll.toLocaleString('id-ID');
    
    let totalAkhir = totalSubtotalAll + 10000; // Ditambah Ongkir 10rb
    document.getElementById('summary-total').innerText = 'Rp ' + totalAkhir.toLocaleString('id-ID');
}

function hapusItem(index) {
    let listItem = JSON.parse(localStorage.getItem('produkKeranjangReal')) || [];
    // Hapus produk berdasarkan baris yang diklik
    listItem.splice(index, 1);
    localStorage.setItem('produkKeranjangReal', JSON.stringify(listItem));
    loadKeranjang(); // Refresh tampilan tabel
}

// Jalankan pengecekan saat halaman dibuka
window.onload = loadKeranjang;
</script>

</body>
</html>
